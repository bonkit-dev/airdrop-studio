name: Publish Public Studio

on:
  workflow_dispatch:

concurrency:
  group: publish-public-studio
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout mirror repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build public package
        run: pnpm --filter @bonkit/airdrop-studio build

      - name: Publish to npm
        working-directory: packages/airdrop-studio
        run: npm publish --access public --provenance

      - name: Tag published release
        run: |
          VERSION="$(node -p "require('./packages/airdrop-studio/package.json').version")"
          TAG="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
